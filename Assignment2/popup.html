<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Price Scout</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Price Scout</h1>
      <p class="subtitle">AI-Powered Price Comparison</p>
    </header>

    <div class="search-box">
      <input type="text" id="productInput" placeholder="What are you looking for?" autofocus>
      <button id="searchBtn">Search</button>
      <button id="downloadBtn" title="Download Report" style="display: none;">📥</button>
    </div>

    <div id="loader" class="loader">
      <div class="spinner"></div>
      <p style="margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);">Consulting Gemini...</p>
    </div>

    <div id="results" class="results-container">
      <div class="empty-state">
        <p>Enter a product name to compare prices across Amazon, Flipkart, Nykaa, and Myntra.</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
